services:
  postgres:
    image: postgres:17-alpine
    container_name: aspace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aspace
    ports:
      - "5432:5432"
    volumes:
      - aspace-postgres-data:/var/lib/postgresql/data

volumes:
  aspace-postgres-data:
